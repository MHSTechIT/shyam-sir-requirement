services:
  db:
    image: postgres:16-alpine
    container_name: mhs_orgchart_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: orgchart
      POSTGRES_PASSWORD: orgchart
      POSTGRES_DB: orgchart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
