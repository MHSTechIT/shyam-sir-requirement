# Render Blueprint — backend API only (Express + node-postgres).
# Frontend is deployed separately on Vercel (see README "Deploy").
#
# In Render: New + → Blueprint → pick this repo. Or create a Web Service
# manually with the same settings.
services:
  - type: web
    name: mhs-orgchart-api
    runtime: node
    rootDir: backend
    plan: free
    # --include=dev is REQUIRED: NODE_ENV=production makes npm skip devDeps,
    # but TypeScript (tsc) lives there and is needed to build.
    buildCommand: npm install --include=dev && npm run build
    # No migration step needed — the app creates tables on boot (ensureSchema).
    startCommand: npm start
    healthCheckPath: /api/health
    # No disk needed — uploaded documents are stored in PostgreSQL (files.data).
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # set in the Render dashboard (your Postgres URL)
      - key: CLIENT_ORIGIN
        sync: false # set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: SHARED_PASSWORD
        sync: false # optional: set to enable the password gate
